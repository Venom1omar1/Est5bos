<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="ar" dir="rtl">
<head>
    <title>جامعة القاهرة الأهلية - نظام معلومات إدارة الطلاب</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        html, body {
            height: 100%;
            min-height: 100vh;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa, #e4e9f2);
            display: flex;
            flex-direction: column;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .circle-1 {
            width: 220px;
            height: 220px;
            top: -80px;
            left: -80px;
            background: rgba(12, 58, 109, 0.05);
        }

        .circle-2 {
            width: 150px;
            height: 150px;
            bottom: -60px;
            right: 100px;
            background: rgba(26, 93, 164, 0.05);
        }

        .line {
            position: absolute;
            height: 2px;
            background: rgba(255, 255, 255, 0.15);
            transform: rotate(-45deg);
        }

        .line-1 {
            width: 400px;
            top: 30%;
            left: -100px;
        }

        .line-2 {
            width: 300px;
            bottom: 40%;
            right: -50px;
        }

        .logo-container {
            display: flex;
            align-items: center;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            z-index: 2;
            color: #fff;
            min-width: 50%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
        }

        .logo-image {
            height: 105px;
            width: auto;
            object-fit: contain;
        }

        .divider {
            width: 2px;
            height: 80px;
            background: linear-gradient(to bottom, transparent, rgba(255, 255, 255, 0.5), transparent);
            margin: 0 30px;
        }

        .floating {
            position: absolute;
            color: rgba(255, 255, 255, 0.08);
            font-size: 100px;
            font-weight: 800;
            z-index: 1;
            user-select: none;
            animation: float 15s infinite linear;
        }

        .floating-1 {
            top: 20px;
            right: 100px;
            animation-delay: 0s;
        }

        .floating-2 {
            bottom: 40px;
            left: 150px;
            animation-delay: -5s;
        }

        .floating-3 {
            top: 120px;
            left: 400px;
            animation-delay: -10s;
        }

        @keyframes float {
            0% { transform: translateY(0) translateX(0); }
            25% { transform: translateY(-20px) translateX(20px); }
            50% { transform: translateY(0) translateX(40px); }
            75% { transform: translateY(20px) translateX(20px); }
            100% { transform: translateY(0) translateX(0); }
        }

        .login-indicator {
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            display: flex;
            align-items: center;
            z-index: 2;
        }

        .login-indicator::before,
        .login-indicator::after {
            content: '';
            width: 60px;
            height: 1px;
            background: rgba(255, 255, 255, 0.5);
            margin: 0 15px;
        }

        .login-container {
            flex: 1;
            width: 100%;
            max-width: 1200px;
            background: white;
            border-radius: 0 0 12px 12px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            width: 100%;
            max-width: 500px;
            background: #f9fbfd;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
            border: 1px solid #e1e8f0;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h2 {
            color: #0c3a6d;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .error-message {
            background: #fee;
            border: 1px solid #fcc;
            color: #c00;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
            font-size: 14px;
            line-height: 1.6;
        }

        .error-message.show {
            display: block;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        .error-message a {
            color: #1a5da4;
            text-decoration: underline;
        }

        .login-header p {
            color: #5a6c84;
            font-size: 16px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #0c3a6d;
            font-weight: 600;
            font-size: 15px;
        }

        .form-control {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #d1dbe5;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: #1a5da4;
            outline: none;
            box-shadow: 0 0 0 3px rgba(26, 93, 164, 0.2);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(to right, #0c3a6d, #1a5da4);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(12, 58, 109, 0.2);
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            background: linear-gradient(to right, #0a2f59, #154b87);
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(12, 58, 109, 0.3);
        }

        .forgot-password {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #1a5da4;
            text-decoration: none;
            transition: color 0.2s;
        }

        .forgot-password:hover {
            color: #0c3a6d;
            text-decoration: underline;
        }

        .footer {
            margin-top: 40px;
            text-align: center;
            color: #5a6c84;
            font-size: 14px;
            padding: 20px;
            border-top: 1px solid #e1e8f0;
            width: 100%;
        }

        .banner-container {
            width: 100%;
            max-width: 1200px;
            margin-bottom: 30px;
            border-radius: 12px 12px 0 0;
            overflow: visible;
        }

        .university-banner {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 5px;
            background: linear-gradient(120deg, #27486b, #1aa49c, #2ac791);
            margin-top: 5px;
            overflow: hidden;
            border-radius: 12px 12px 0 0;
        }

        .banner-decoration {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            overflow: visible;
        }

        .logo-container,
        .system-title,
        .login-indicator {
            position: relative;
            z-index: 2;
        }

        .system-title {
            font-size: 36px;
            color: white;
            font-weight: bold;
            text-align: center;
            margin-top: 30px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .university-name h1 {
            color: #fff;
            font-size: 28px;
            text-shadow: 2px 3px 4px rgba(0, 0, 0, 0.4);
        }
    </style>
</head>
<body>
    <!-- Banner -->
    <div class="banner-container">
        <div class="university-banner">
            <!-- الزخارف -->
            <div class="banner-decoration">
                <div class="circle circle-1"></div>
                <div class="circle circle-2"></div>
                <div class="line line-1"></div>
                <div class="line line-2"></div>
                
                <div class="floating floating-2">CNU</div>
                <div class="floating floating-3">جامعة القاهرة الأهلية</div>
            </div>

            <!-- شعار الجامعة -->
            <div class="logo-container">
                <img src="FacLogo.png" alt="شعار الجامعة" class="logo-image">
                <div class="divider"></div>
                <div class="university-name">
                    <h1>جـــامعة القــــاهرة الأهلــية</h1>
                </div>
            </div>

            <!-- عنوان النظام -->
            <div class="system-title" style="display:none;">نظام معلومات إدارة الطلاب</div>

            <!-- مؤشر الدخول -->
            <div class="login-indicator">نظام المعلومات</div>
        </div>
    </div>

    <!-- Login -->
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h2>تسجيل الدخول</h2>
                <!-- Error Message -->
                <div id="errorMsg" class="error-message">
                    Username or Password may be incorrect , Try again<br>
                    or <a href="#" onclick="resetPassword()">Click here</a> to reset your password
                </div>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="txtUsername">كود المستخدم</label>
                    <input 
                        type="text" 
                        id="txtUsername" 
                        class="form-control" 
                        placeholder="أدخل كود المستخدم"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="txtPassword">كلمة المرور</label>
                    <input 
                        type="password" 
                        id="txtPassword" 
                        class="form-control" 
                        placeholder="أدخل كلمة المرور"
                        required
                    >
                </div>

                <button type="submit" class="btn-login">تسجيل الدخول</button>
            </form>
            
            <a href="#" class="forgot-password" onclick="resetPassword()">نسيت كلمة المرور؟</a>
        </div>
        
        <div class="footer">
            <p>جميع الحقوق محفوظة © 2026 جامعة القاهرة الأهلية | نظام معلومات إدارة الطلاب</p>
        </div>
    </div>

    <script>
        // Valid credentials
        const VALID_USERNAME = "80250020";
        const VALID_PASSWORD = "6730457";

        function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('txtUsername').value.trim();
            const password = document.getElementById('txtPassword').value.trim();
            const errorMsg = document.getElementById('errorMsg');

            // Check credentials
            if (username === VALID_USERNAME && password === VALID_PASSWORD) {
                // Hide error message
                errorMsg.classList.remove('show');
                
                // Redirect to grade.html
                window.location.href = 'grade.html';
            } else {
                // Show error message
                errorMsg.classList.add('show');
                
                // Clear password field
                document.getElementById('txtPassword').value = '';
                
                // Focus on username field
                document.getElementById('txtUsername').focus();
            }
        }

        function resetPassword() {
            alert('سيتم إرسال رابط إعادة تعيين كلمة المرور إلى بريدك الإلكتروني المسجل');
        }

        // Handle Enter key press
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                handleLogin(e);
            }
        });
    </script>
</body>
</html>
